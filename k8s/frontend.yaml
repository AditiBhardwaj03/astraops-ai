apiVersion: apps/v1
kind: Deployment
metadata:
  name: astraops-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: astraops-frontend
  template:
    metadata:
      labels:
        app: astraops-frontend
    spec:
      containers:
        - name: frontend
          image: astraops-frontend
          imagePullPolicy: Never
          env:
            - name: NEXT_PUBLIC_BACKEND_URL
              value: "http://astraops-backend-service:5001"
          ports:
            - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: astraops-frontend-service
spec:
  type: NodePort
  selector:
    app: astraops-frontend
  ports:
    - port: 3000
      targetPort: 3000
